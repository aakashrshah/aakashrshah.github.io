name: Fetch Oil Prices

on:
  schedule:
    # Every 6 hours — uses 2 API calls per run, well within free tier (25/day)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify API key is set
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          if [ -z "${ALPHA_VANTAGE_API_KEY}" ]; then
            echo "ERROR: ALPHA_VANTAGE_API_KEY secret is not set."
            echo "Go to Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: ALPHA_VANTAGE_API_KEY"
            exit 1
          fi
          KEY_LEN=${#ALPHA_VANTAGE_API_KEY}
          KEY_PREVIEW="${ALPHA_VANTAGE_API_KEY:0:4}...${ALPHA_VANTAGE_API_KEY: -4}"
          echo "API key is set — length: ${KEY_LEN}, preview: ${KEY_PREVIEW}"

      - name: Fetch WTI crude oil price
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          echo "=== Fetching WTI crude oil (West Texas Intermediate) ==="
          HTTP_STATUS=$(curl -s -o /tmp/wti_raw.json -w "%{http_code}" \
            "https://www.alphavantage.co/query?function=WTI&interval=daily&apikey=${ALPHA_VANTAGE_API_KEY}")
          echo "WTI HTTP status: ${HTTP_STATUS}"

          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "ERROR: Non-200 response for WTI (got ${HTTP_STATUS})"
            exit 1
          fi

          # Show response structure (keys only, no sensitive data)
          python3 -c "
          import json
          with open('/tmp/wti_raw.json') as f:
              d = json.load(f)
          keys = list(d.keys())
          print('WTI response keys:', keys)
          if 'data' in d:
              print(f'WTI data points: {len(d[\"data\"])}')
              print(f'WTI most recent: {d[\"data\"][0]}')
          elif 'Information' in d:
              print('ERROR — Rate limit hit:', d['Information'][:120])
              exit(1)
          else:
              print('ERROR — Unexpected response structure')
              exit(1)
          "

      - name: Wait 15 seconds (Alpha Vantage rate limit: 5 req/min on free tier)
        run: |
          echo "Waiting 15s before next API call to avoid rate limiting..."
          sleep 15
          echo "Done waiting."

      - name: Fetch Brent crude oil price
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          echo "=== Fetching Brent crude oil (ICE) ==="
          HTTP_STATUS=$(curl -s -o /tmp/brent_raw.json -w "%{http_code}" \
            "https://www.alphavantage.co/query?function=BRENT&interval=daily&apikey=${ALPHA_VANTAGE_API_KEY}")
          echo "Brent HTTP status: ${HTTP_STATUS}"

          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "ERROR: Non-200 response for Brent (got ${HTTP_STATUS})"
            exit 1
          fi

          python3 -c "
          import json
          with open('/tmp/brent_raw.json') as f:
              d = json.load(f)
          keys = list(d.keys())
          print('Brent response keys:', keys)
          if 'data' in d:
              print(f'Brent data points: {len(d[\"data\"])}')
              print(f'Brent most recent: {d[\"data\"][0]}')
          elif 'Information' in d:
              print('ERROR — Rate limit hit:', d['Information'][:120])
              exit(1)
          else:
              print('ERROR — Unexpected response structure')
              exit(1)
          "

      - name: Combine and write dashboard JSON
        run: |
          echo "=== Combining into dashboard/data/oil-prices.json ==="
          python3 - <<'PYEOF'
          import json, datetime, os, sys

          def load(path):
              with open(path) as f:
                  return json.load(f)

          wti   = load('/tmp/wti_raw.json')
          brent = load('/tmp/brent_raw.json')

          # Final validation
          errors = []
          if 'data' not in wti:
              errors.append(f"WTI missing 'data' key. Keys: {list(wti.keys())}")
          if 'data' not in brent:
              errors.append(f"Brent missing 'data' key. Keys: {list(brent.keys())}")
          if errors:
              for e in errors:
                  print("ERROR:", e)
              sys.exit(1)

          output = {
              'updated_at': datetime.datetime.utcnow().isoformat() + 'Z',
              'wti': wti,
              'brent': brent,
          }

          os.makedirs('dashboard/data', exist_ok=True)
          with open('dashboard/data/oil-prices.json', 'w') as f:
              json.dump(output, f, indent=2)

          wti_latest   = wti['data'][0]
          brent_latest = brent['data'][0]
          print(f"SUCCESS")
          print(f"  WTI:   {wti_latest['date']} = ${wti_latest['value']}/bbl  ({len(wti['data'])} records)")
          print(f"  Brent: {brent_latest['date']} = ${brent_latest['value']}/bbl  ({len(brent['data'])} records)")
          print(f"  Written to dashboard/data/oil-prices.json")
          PYEOF

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/oil-prices.json

          if git diff --staged --quiet; then
            echo "No changes to commit — prices unchanged since last run."
          else
            git commit -m "chore: update oil price data [skip ci]"
            git push
            echo "Pushed updated oil-prices.json."
          fi
