name: Fetch Oil Prices

on:
  schedule:
    # Every 6 hours (Alpha Vantage free tier: 25 req/day — 4 runs/day = 8 calls)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — secrets.GITHUB_TOKEN is auto-provided
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch WTI and Brent crude oil prices
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          echo "Fetching WTI crude oil data..."
          curl -sf "https://www.alphavantage.co/query?function=WTI&interval=daily&apikey=${ALPHA_VANTAGE_API_KEY}" \
            -o /tmp/wti_raw.json

          echo "Fetching Brent crude oil data..."
          curl -sf "https://www.alphavantage.co/query?function=BRENT&interval=daily&apikey=${ALPHA_VANTAGE_API_KEY}" \
            -o /tmp/brent_raw.json

          echo "Combining into dashboard/data/oil-prices.json..."
          python3 - <<'PYEOF'
          import json, datetime, os, sys

          def load(path):
              with open(path) as f:
                  return json.load(f)

          wti   = load('/tmp/wti_raw.json')
          brent = load('/tmp/brent_raw.json')

          # Validate — Alpha Vantage returns {"Information": "..."} on rate-limit errors
          if 'data' not in wti or 'data' not in brent:
              print("ERROR: Unexpected API response. Possible rate limit or bad API key.")
              print("WTI response keys:", list(wti.keys()))
              print("Brent response keys:", list(brent.keys()))
              sys.exit(1)

          output = {
              'updated_at': datetime.datetime.utcnow().isoformat() + 'Z',
              'wti': wti,
              'brent': brent,
          }

          os.makedirs('dashboard/data', exist_ok=True)
          with open('dashboard/data/oil-prices.json', 'w') as f:
              json.dump(output, f, indent=2)

          print(f"Done. WTI records: {len(wti['data'])}, Brent records: {len(brent['data'])}")
          PYEOF

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/oil-prices.json

          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to commit — data is up to date."
          else
            git commit -m "chore: update oil price data [skip ci]"
            git push
            echo "Pushed updated oil-prices.json."
          fi
