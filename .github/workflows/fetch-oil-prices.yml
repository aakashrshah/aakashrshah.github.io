name: Fetch Oil Prices

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify API key is set
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          if [ -z "${ALPHA_VANTAGE_API_KEY}" ]; then
            echo "ERROR: ALPHA_VANTAGE_API_KEY secret is not set."
            echo "Go to Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi
          KEY_LEN=${#ALPHA_VANTAGE_API_KEY}
          KEY_PREVIEW="${ALPHA_VANTAGE_API_KEY:0:4}...${ALPHA_VANTAGE_API_KEY: -4}"
          echo "API key is set -- length: ${KEY_LEN}, preview: ${KEY_PREVIEW}"

      - name: Fetch WTI crude oil price
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          echo "=== Fetching WTI crude oil (West Texas Intermediate) ==="
          HTTP_STATUS=$(curl -s -o /tmp/wti_raw.json -w "%{http_code}" \
            "https://www.alphavantage.co/query?function=WTI&interval=daily&apikey=${ALPHA_VANTAGE_API_KEY}")
          echo "WTI HTTP status: ${HTTP_STATUS}"
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "ERROR: Non-200 response for WTI (got ${HTTP_STATUS})"
            exit 1
          fi
          echo "WTI raw response (first 200 chars):"
          head -c 200 /tmp/wti_raw.json
          echo ""

      - name: Wait to avoid rate limiting
        run: sleep 15

      - name: Fetch Brent crude oil price
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          echo "=== Fetching Brent crude oil (ICE) ==="
          HTTP_STATUS=$(curl -s -o /tmp/brent_raw.json -w "%{http_code}" \
            "https://www.alphavantage.co/query?function=BRENT&interval=daily&apikey=${ALPHA_VANTAGE_API_KEY}")
          echo "Brent HTTP status: ${HTTP_STATUS}"
          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "ERROR: Non-200 response for Brent (got ${HTTP_STATUS})"
            exit 1
          fi
          echo "Brent raw response (first 200 chars):"
          head -c 200 /tmp/brent_raw.json
          echo ""

      - name: Combine and write dashboard JSON
        run: python3 .github/scripts/fetch_oil_prices.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/oil-prices.json
          if git diff --staged --quiet; then
            echo "No changes to commit -- prices unchanged since last run."
          else
            git commit -m "chore: update oil price data [skip ci]"
            git push
            echo "Pushed updated oil-prices.json."
          fi
