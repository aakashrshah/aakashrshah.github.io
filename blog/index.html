<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Aakash Shah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/blog.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="blog-nav">
    <div class="blog-nav-inner">
      <a href="../" class="blog-nav-logo">aakash<span>shah</span></a>
      <div class="blog-nav-links">
        <a href="../#about" class="hide-mobile">Portfolio</a>
        <a href="../#contact" class="hide-mobile">Contact</a>
        <a href="write.html" class="btn-write">Write</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <div class="blog-hero">
    <h1>Thoughts &amp; Writing</h1>
    <p>On AI, product management, user adoption, and building things that matter.</p>
  </div>

  <!-- Search & Tags -->
  <div class="blog-controls">
    <div class="search-wrapper">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="blog-search" placeholder="Search posts by title, content, or tags...">
    </div>
    <div class="tag-filters" id="tag-filters"></div>
  </div>

  <!-- Post Grid -->
  <div class="blog-grid" id="blog-grid">
    <div class="no-results">Loading posts...</div>
  </div>

  <!-- Footer -->
  <footer class="blog-footer">
    <p>Aakash Shah &bull; Austin, TX</p>
  </footer>

  <script src="js/blog.js"></script>
</body>
</html>
